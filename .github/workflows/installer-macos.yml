name: macOS Installer CI

on:
  push:
    branches: [ main ]
    paths:
      - 'build_complete_installer_mac.sh'
      - 'create_mac_dmg.sh'
      - 'src-tauri/**'
      - 'scripts/**'
      - '.github/workflows/installer-macos.yml'
  pull_request:
    paths:
      - 'build_complete_installer_mac.sh'
      - 'create_mac_dmg.sh'
      - 'src-tauri/**'
      - 'scripts/**'
      - '.github/workflows/installer-macos.yml'
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build online mac installer
        run: bash ./build_complete_installer_mac.sh

      - name: Run DMG smoke tests
        run: bash ./scripts/ci/smoke_test_mac_installer.sh installers/StemSplit_Online_Setup.dmg installers/smoke-macos.json

      - name: Validate model payload folders
        run: |
          python3 ./scripts/ci/validate_model_payloads.py \
            --manifest "./scripts/ci/model_payload_manifest.json" \
            --repo-root "." \
            --json-out "installers/model-payload-report.json" \
            --md-out "installers/model-payload-report.md"

      - name: Generate release integrity manifest
        run: |
          python3 ./scripts/ci/generate_release_manifest.py \
            --platform macos \
            --pattern "installers/StemSplit_Online_Setup.dmg" \
            --pattern "installers/checksums-mac.sha256" \
            --out "installers/release-manifest-macos.json"

      - name: Enforce installer quality gate (90+)
        run: |
          python3 ./scripts/ci/installer_quality_gate.py \
            --platform macos \
            --installer-glob "installers/StemSplit_Online_Setup.dmg" \
            --checksum-file "installers/checksums-mac.sha256" \
            --threshold 90 \
            --smoke-report "installers/smoke-macos.json" \
            --payload-report "installers/model-payload-report.json" \
            --required-file ".github/workflows/macos-release-signed-notarized.yml" \
            --required-file "scripts/ci/smoke_test_mac_installer.sh" \
            --required-file "docs/CODE_SIGNING_MACOS.md" \
            --required-file "create_mac_dmg.sh" \
            --required-file "scripts/ci/validate_model_payloads.py" \
            --required-file "scripts/ci/model_payload_manifest.json" \
            --json-out "installers/quality-gate-macos.json" \
            --md-out "installers/quality-gate-macos.md"

      - name: Upload mac installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-macOS-Installer
          path: |
            installers/StemSplit_Online_Setup.dmg
            installers/checksums-mac.sha256
            installers/smoke-macos.json
            installers/model-payload-report.json
            installers/model-payload-report.md
            installers/release-manifest-macos.json
            installers/quality-gate-macos.json
            installers/quality-gate-macos.md
          retention-days: 14
