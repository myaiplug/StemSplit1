name: Windows Installer CI

on:
  push:
    branches: [ main ]
    paths:
      - 'build_complete_installer.ps1'
      - 'setup.iss'
      - 'setup_online.iss'
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - '.github/workflows/installer-windows.yml'
  pull_request:
    paths:
      - 'build_complete_installer.ps1'
      - 'setup.iss'
      - 'setup_online.iss'
      - 'src/**'
      - 'src-tauri/**'
      - 'scripts/**'
      - '.github/workflows/installer-windows.yml'
  workflow_dispatch:

jobs:
  build-and-smoke-test:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install dependencies
        shell: pwsh
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        shell: pwsh
        run: npm run build

      - name: Build Tauri executable
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo build --release

      - name: Build online installer (deterministic CI mode)
        shell: pwsh
        env:
          STEMSPLIT_INSTALLER_SKIP_ONLINE_DOWNLOADS: '1'
        run: .\build_complete_installer.ps1 -Online -SkipBuild

      - name: Run installer smoke tests
        shell: pwsh
        run: .\scripts\ci\smoke_test_installer.ps1 -ReportPath installers\smoke-windows.json

      - name: Validate model payload folders
        shell: pwsh
        run: |
          python .\scripts\ci\validate_model_payloads.py `
            --manifest ".\scripts\ci\model_payload_manifest.json" `
            --repo-root "." `
            --json-out "installers/model-payload-report.json" `
            --md-out "installers/model-payload-report.md"

      - name: Generate release integrity manifest
        shell: pwsh
        run: |
          python .\scripts\ci\generate_release_manifest.py `
            --platform windows `
            --pattern "installers/StemSplit_Setup_*_Online.exe" `
            --pattern "installers/checksums-windows.sha256" `
            --out "installers/release-manifest-windows.json"

      - name: Enforce installer quality gate (90+)
        shell: pwsh
        run: |
          python .\scripts\ci\installer_quality_gate.py `
            --platform windows `
            --installer-glob "installers/StemSplit_Setup_*_Online.exe" `
            --checksum-file "installers/checksums-windows.sha256" `
            --threshold 90 `
            --smoke-report "installers/smoke-windows.json" `
            --payload-report "installers/model-payload-report.json" `
            --required-file ".github/workflows/windows-release-signed.yml" `
            --required-file "scripts/sign_windows_release.ps1" `
            --required-file "docs/CODE_SIGNING_WINDOWS.md" `
            --required-file "setup_online.iss" `
            --required-file "scripts/ci/validate_model_payloads.py" `
            --required-file "scripts/ci/model_payload_manifest.json" `
            --json-out "installers/quality-gate-windows.json" `
            --md-out "installers/quality-gate-windows.md"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-Installer-Windows-Online
          path: |
            installers/StemSplit_Setup_*_Online.exe
            installers/checksums-windows.sha256
            installers/smoke-windows.json
            installers/model-payload-report.json
            installers/model-payload-report.md
            installers/release-manifest-windows.json
            installers/quality-gate-windows.json
            installers/quality-gate-windows.md
          retention-days: 14
