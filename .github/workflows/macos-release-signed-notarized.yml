name: macOS Signed and Notarized Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-sign-notarize:
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Validate notarization secrets
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          [[ -n "$MACOS_CERTIFICATE_P12_BASE64" ]] || { echo 'Missing MACOS_CERTIFICATE_P12_BASE64'; exit 1; }
          [[ -n "$MACOS_CERTIFICATE_PASSWORD" ]] || { echo 'Missing MACOS_CERTIFICATE_PASSWORD'; exit 1; }
          [[ -n "$MACOS_SIGNING_IDENTITY" ]] || { echo 'Missing MACOS_SIGNING_IDENTITY'; exit 1; }
          [[ -n "$APPLE_ID" ]] || { echo 'Missing APPLE_ID'; exit 1; }
          [[ -n "$APPLE_APP_SPECIFIC_PASSWORD" ]] || { echo 'Missing APPLE_APP_SPECIFIC_PASSWORD'; exit 1; }
          [[ -n "$APPLE_TEAM_ID" ]] || { echo 'Missing APPLE_TEAM_ID'; exit 1; }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import signing certificate
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          echo "$MACOS_CERTIFICATE_P12_BASE64" | base64 --decode > cert.p12
          security create-keychain -p "temp-pass" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp-pass" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import cert.p12 -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp-pass" build.keychain

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build and sign app bundle
        run: npm run tauri build

      - name: Create signed DMG
        env:
          MAC_CODESIGN_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: bash ./create_mac_dmg.sh

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit installers/StemSplit.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple installers/StemSplit.dmg
          xcrun stapler validate installers/StemSplit.dmg

      - name: Generate checksums
        run: |
          shasum -a 256 installers/StemSplit.dmg | awk '{print $1 "  StemSplit.dmg"}' > installers/checksums-mac.sha256

      - name: Upload signed notarized artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-macOS-Signed-Notarized
          path: |
            installers/StemSplit.dmg
            installers/checksums-mac.sha256
          retention-days: 30

      - name: Release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installers/StemSplit.dmg
            installers/checksums-mac.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain materials
        if: always()
        run: |
          rm -f cert.p12
          security delete-keychain build.keychain || true
