name: Build macOS Installer

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Add Rust targets
        run: |
          source $HOME/.cargo/env
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install dependencies
        run: |
          npm install
          pip install -r requirements.txt || echo "Some Python packages may have failed"
      
      - name: Make scripts executable
        run: |
          chmod +x build_complete_installer_mac.sh
          chmod +x setup_python_env_mac.sh
          chmod +x create_mac_dmg.sh
          chmod +x src-tauri/generate_icons.sh
      
      - name: Setup Python environment
        run: |
          ./setup_python_env_mac.sh || echo "Python env setup had issues, continuing..."
      
      - name: Generate icons
        run: |
          cd src-tauri
          ./generate_icons.sh || echo "Icon generation failed, using defaults"
          cd ..
      
      - name: Build Next.js app
        run: npm run build
      
      - name: Build Tauri app
        run: |
          source $HOME/.cargo/env
          cd src-tauri
          cargo tauri build
          cd ..
      
      - name: Create DMG
        run: |
          if [ -d "src-tauri/target/release/bundle/macos" ]; then
            ./create_mac_dmg.sh || echo "DMG creation failed, checking for app bundle..."
          else
            echo "App bundle not found, checking build output..."
            ls -la src-tauri/target/release/bundle/ || true
          fi
      
      - name: Get DMG info
        id: dmg_info
        run: |
          DMG_PATH="installers/StemSplit.dmg"
          if [ -f "$DMG_PATH" ]; then
            DMG_SIZE=$(du -h "$DMG_PATH" | cut -f1)
            echo "size=$DMG_SIZE" >> $GITHUB_OUTPUT
            echo "✓ DMG created: $DMG_SIZE"
          else
            echo "❌ DMG not found"
            exit 1
          fi
      
      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-macOS-${{ github.sha }}
          path: installers/StemSplit.dmg
          retention-days: 30
      
      - name: Upload to Release (if tagged)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: installers/StemSplit.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build Summary
        run: |
          echo "## Build Complete! 🎉" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Platform:** macOS Universal (Apple Silicon + Intel)" >> $GITHUB_STEP_SUMMARY
          echo "- **DMG Size:** ${{ steps.dmg_info.outputs.size }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Location:** installers/StemSplit.dmg" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Installation" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Download the DMG artifact" >> $GITHUB_STEP_SUMMARY
          echo "# Double-click to mount" >> $GITHUB_STEP_SUMMARY
          echo "# Drag StemSplit.app to Applications" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # Optional: Separate builds for Intel and Apple Silicon
  build-architecture-specific:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: |
          chmod +x setup_python_env_mac.sh
          ./setup_python_env_mac.sh
          npm run build
          cd src-tauri
          cargo tauri build --target ${{ matrix.target }}
      
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-${{ matrix.target }}-${{ github.sha }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/StemSplit.app
          retention-days: 7
