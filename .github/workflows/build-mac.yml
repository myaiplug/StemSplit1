name: Build macOS DMG

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Setup Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-cargo-
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build frontend
        run: npm run build
      
      - name: Build Tauri
        run: npx tauri build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prepare DMG
        run: |
          mkdir -p installers
          
          # Check what Tauri produced
          echo "=== Bundle contents ==="
          ls -la src-tauri/target/release/bundle/ || true
          ls -la src-tauri/target/release/bundle/dmg/ 2>/dev/null || true
          ls -la src-tauri/target/release/bundle/macos/ 2>/dev/null || true
          
          # Copy DMG if exists
          if ls src-tauri/target/release/bundle/dmg/*.dmg 1> /dev/null 2>&1; then
            cp src-tauri/target/release/bundle/dmg/*.dmg installers/StemSplit.dmg
            echo "✅ Found and copied DMG"
          # Or create from .app
          elif ls src-tauri/target/release/bundle/macos/*.app 1> /dev/null 2>&1; then
            APP=$(ls -d src-tauri/target/release/bundle/macos/*.app | head -1)
            echo "Creating DMG from $APP"
            hdiutil create -volname "StemSplit" -srcfolder "$APP" -ov -format UDZO installers/StemSplit.dmg
            echo "✅ Created DMG from app"
          else
            echo "❌ No .app or .dmg found!"
            find src-tauri/target -name "*.app" -o -name "*.dmg" 2>/dev/null
            exit 1
          fi
          
          ls -lh installers/
      
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-macOS
          path: installers/StemSplit.dmg
          retention-days: 30
      
      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: installers/StemSplit.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
