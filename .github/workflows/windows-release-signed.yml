name: Windows Signed Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-sign-release:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Validate signing secrets
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_B64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PFX_B64)) { throw 'Missing secret WINDOWS_CERT_PFX_B64' }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) { throw 'Missing secret WINDOWS_CERT_PASSWORD' }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install dependencies
        shell: pwsh
        run: npm ci --legacy-peer-deps

      - name: Repair and verify embedded runtime
        shell: pwsh
        run: .\setup_embedded_python.ps1 -RepairIfNeeded

      - name: Build frontend
        shell: pwsh
        run: npm run build

      - name: Build Tauri executable
        shell: pwsh
        run: |
          Set-Location src-tauri
          cargo build --release

      - name: Build offline installer
        shell: pwsh
        run: .\build_complete_installer.ps1 -Offline -SkipBuild

      - name: Materialize signing certificate
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_B64: ${{ secrets.WINDOWS_CERT_PFX_B64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_B64)
          [IO.File]::WriteAllBytes('codesign.pfx', $bytes)

      - name: Sign binaries and installer
        shell: pwsh
        env:
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          .\scripts\sign_windows_release.ps1 `
            -CertPath .\codesign.pfx `
            -CertPassword $env:WINDOWS_CERT_PASSWORD `
            -Files @('src-tauri\target\release\StemSplit.exe', 'installers\StemSplit_Setup_*.exe')

      - name: Upload signed artifacts
        uses: actions/upload-artifact@v4
        with:
          name: StemSplit-Windows-Signed
          path: |
            src-tauri/target/release/StemSplit.exe
            installers/StemSplit_Setup_*.exe
          retention-days: 30

      - name: Release signed installer
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installers/StemSplit_Setup_*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup certificate
        if: always()
        shell: pwsh
        run: Remove-Item .\codesign.pfx -Force -ErrorAction SilentlyContinue
