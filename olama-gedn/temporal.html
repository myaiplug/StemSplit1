            flangerLfoOsc.frequency.setTargetAtTime(0.08 + s * 0.42, t, 0.05);
            flangerWetNode.gain.setTargetAtTime((s * wetMix) * 0.22, t, 0.03);
        }

        // Update dimensional coordinates
        function updateCoordinates() {
            const totalSemitones = currentKeySemitones + currentPitchBend + (currentDetuneCents / 100);
            document.getElementById('coordPitch').innerText = totalSemitones.toFixed(2) + ' st';
            document.getElementById('coordTemporal').innerText = currentTimeShift.toFixed(0) + '%';

            // Detune
            document.getElementById('coordDrift').innerText = Math.round(currentDetuneCents) + '¢';

            // Speed ripple (doppler-like shift)
            const ripple = (currentTimeShift / 100).toFixed(2);
            document.getElementById('coordRipple').innerText = ripple + 'x';
        }

        // Engine UI
        if (engineSelect) {
            engineSelect.value = timePitchEngine;
            engineSelect.addEventListener('change', () => {
                const val = engineSelect.value;

        // Setup knob interactions
        function setupKnob(elementId, minVal, maxVal, defaultVal, updateFunc) {
            const knob = document.getElementById(elementId);
            let isDragging = false;
            let startY;
            let startVal;

            if (!knob) return;

            knob.addEventListener('mousedown', (e) => {
                isDragging = true;
                startY = e.clientY;
                if (elementId === 'timeKnob') {
                    startVal = currentTimeShift;
                } else if (elementId === 'pitchKnob') {
                    startVal = currentPitchBend;
                } else if (elementId === 'keyKnob') {
                    startVal = currentKeySemitones;
                } else if (elementId === 'detuneKnob') {
                    startVal = currentDetuneCents;
                } else if (elementId === 'sauceKnob') {
                    startVal = currentSauce;
                }
                document.body.style.cursor = 'ns-resize';
                e.preventDefault();
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    document.body.style.cursor = 'default';
                }
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const deltaY = startY - e.clientY;
                const sensitivity = (maxVal - minVal) / 200;
                let newVal = startVal + (deltaY * sensitivity);
                newVal = Math.max(minVal, Math.min(maxVal, newVal));

                updateFunc(newVal);
                updatePortalVisuals();
            });
        }

        // Portal visualization
        const portalCanvas = document.getElementById('portalCanvas');

        let qualityAvgMs = 16.67;
        const knobAnimState = new Map();

        function refreshQualityUi() {
            if (qualityModeBtn) {
                qualityModeBtn.innerText = `Quality ${qualityModeOverride.toUpperCase()}`;
            }

            if (qualityStatus) {
                qualityStatus.innerText = `QUALITY ${portalQualityMode.toUpperCase()} / ${qualityModeOverride.toUpperCase()}`;

        function toggleQualityMode() {
            if (qualityModeOverride === 'auto') {
                qualityModeOverride = QUALITY_HIGH;
                portalQualityMode = QUALITY_HIGH;
                applyPortalCanvasSize();
            } else if (qualityModeOverride === QUALITY_HIGH) {
                qualityModeOverride = QUALITY_NORMAL;
                portalQualityMode = QUALITY_NORMAL;
                applyPortalCanvasSize();
            } else {
                qualityModeOverride = 'auto';
            }

            updatePortalVisuals();

        window.toggleQualityMode = toggleQualityMode;

        function getPortalRingCount() {
            return portalQualityMode === QUALITY_HIGH ? 8 : 5;
        }

        function getPortalDprCap() {
            return portalQualityMode === QUALITY_HIGH ? 2.5 : 1.5;
        }

        function updateAdaptiveQuality(dtSec) {
            if (qualityModeOverride !== 'auto') {
                const forced = qualityModeOverride === QUALITY_HIGH ? QUALITY_HIGH : QUALITY_NORMAL;
                if (portalQualityMode !== forced) {
                    portalQualityMode = forced;
                    applyPortalCanvasSize();
                    refreshQualityUi();
                }
                return;
            }

            const frameMs = dtSec * 1000;
            qualityAvgMs = (qualityAvgMs * 0.94) + (frameMs * 0.06);
            qualitySampleFrames++;

            if (qualitySampleFrames < 40) return;
            qualitySampleFrames = 0;

            if (qualityAvgMs > 22 && portalQualityMode !== QUALITY_NORMAL) {
                portalQualityMode = QUALITY_NORMAL;
                applyPortalCanvasSize();
                refreshQualityUi();
            } else if (qualityAvgMs < 17.5 && portalQualityMode !== QUALITY_HIGH) {
                portalQualityMode = QUALITY_HIGH;
                applyPortalCanvasSize();
                refreshQualityUi();
            }
        }

        function easeKnobRotation(knobId, targetValue, min, max) {
            const knob = document.getElementById(knobId);
            if (!knob) return;

            const target = clamp(targetValue, min, max);
            const existing = knobAnimState.get(knobId) || {
                current: target,
                target,
                min,
                max,
                raf: 0
            };

            existing.target = target;
            existing.min = min;
            existing.max = max;
            knobAnimState.set(knobId, existing);

            if (existing.raf) return;

            const render = () => {
                const state = knobAnimState.get(knobId);
                if (!state) return;

                state.current += (state.target - state.current) * 0.22;
                const normalized = (state.current - state.min) / (state.max - state.min);
                const rotation = (normalized - 0.5) * 270;
                knob.style.transform = `rotate(${rotation}deg)`;

                if (Math.abs(state.target - state.current) < 0.001) {
                    state.current = state.target;
                    const finalNorm = (state.current - state.min) / (state.max - state.min);
                    const finalRot = (finalNorm - 0.5) * 270;
                    knob.style.transform = `rotate(${finalRot}deg)`;
                    state.raf = 0;
                    return;
                }

                state.raf = requestAnimationFrame(render);
            };

            existing.raf = requestAnimationFrame(render);
        }

        function applyPortalCanvasSize() {
            const container = document.getElementById('portalContainer');
            if (!container || !portalCanvas || !portalCtx) return;

            const cssWidth = Math.max(1, container.clientWidth);
            const cssHeight = Math.max(1, container.clientHeight);
            const dpr = Math.max(1, Math.min(getPortalDprCap(), window.devicePixelRatio || 1));

            portalLogicalWidth = cssWidth;
            portalLogicalHeight = cssHeight;

            portalCanvas.style.width = cssWidth + 'px';
            portalCanvas.style.height = cssHeight + 'px';
            portalCanvas.width = Math.round(cssWidth * dpr);
            portalCanvas.height = Math.round(cssHeight * dpr);

            portalCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
            portalCtx.imageSmoothingEnabled = true;
            portalCtx.imageSmoothingQuality = 'high';
        }

        function initPortal() {
            const container = document.getElementById('portalContainer');
            applyPortalCanvasSize();

            if (portalResizeObserver) {
                portalResizeObserver.disconnect();
            }

            portalResizeObserver = new ResizeObserver(() => {
                applyPortalCanvasSize();
                updatePortalVisuals();
            });

            if (container) {
                portalResizeObserver.observe(container);
            }

            window.addEventListener('resize', () => {
                applyPortalCanvasSize();
                updatePortalVisuals();
            }, { passive: true });

            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    lastFrameTimeMs = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
                }
            });

            updateParticlesFromControls(true);
        }

        function ensureParticleCount(container, count) {
            const target = clamp(Math.round(count), MIN_PARTICLES, MAX_PARTICLES);

            while (particleEls.length < target) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                const baseDuration = 3 + Math.random() * 3;
                const baseDelay = Math.random() * 4;
                particle.dataset.baseDuration = String(baseDuration);
                particle.style.animationDelay = baseDelay + 's';
                container.appendChild(particle);
                particleEls.push(particle);
            }
            while (particleEls.length > target) {
                const p = particleEls.pop();
                if (p && p.parentElement) p.parentElement.removeChild(p);
            }
        }

        function updateParticlesFromControls(force = false) {
            const container = document.getElementById('portalContainer');
            if (!container) return;

            // Detune controls count (abs detune => more particles)
            const detuneNorm = clamp(Math.abs(currentDetuneCents) / 100, 0, 1);
            const count = DEFAULT_PARTICLE_BASE + Math.round(detuneNorm * 28);
            ensureParticleCount(container, count);

            // Key controls speed (negative => slower, positive => faster)
            const keyNorm = clamp(currentKeySemitones / 12, -1, 1);
            const speed = clamp(1 + keyNorm * 0.55, 0.45, 1.75);

            for (const particle of particleEls) {
                const base = Number(particle.dataset.baseDuration || '4');
                const dur = clamp(base / speed, 1.6, 9.5);
                particle.style.animationDuration = dur.toFixed(2) + 's';
            }

            if (force) {
                // small shuffle so it doesn't look identical
                for (const particle of particleEls) {
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                }
            }
        }

        function updatePortalVisuals() {
            if (!portalCtx || portalLogicalWidth <= 0 || portalLogicalHeight <= 0) return;

            const centerX = portalLogicalWidth / 2;
            const centerY = portalLogicalHeight / 2;

            portalCtx.clearRect(0, 0, portalLogicalWidth, portalLogicalHeight);

            // Time controls animation speed; pitch controls rift angle + width
            const timeSpeed = Math.max(0.25, Math.min(3.0, currentTimeShift / 100));
            const totalSemitones = currentKeySemitones + currentPitchBend + (currentDetuneCents / 100);
            const pitchNorm = Math.max(-1, Math.min(1, totalSemitones / 12));
            const riftAngleRad = pitchNorm * (Math.PI / 3); // -60..+60 degrees
            const riftWidth = 1 + (Math.abs(pitchNorm) * 0.55);
            const warpFactor = 1 + (Math.abs(pitchNorm) * 0.65);

            // Apply pitch-driven rift skew/angle to the SVG tear
            const tear = document.querySelector('.dimensional-tear');
            if (tear) {
                const scaleY = 1 + (Math.abs(pitchNorm) * 0.12);
                tear.style.transform = `translate(-50%, -50%) rotate(${riftAngleRad}rad) scale(${riftWidth}, ${scaleY})`;
            }

            // Draw swirling portal rings
            const ringCount = getPortalRingCount();
            for (let i = 0; i < ringCount; i++) {
                const radius = 50 + (i * 25) * warpFactor;
                const alpha = 0.3 - (i * 0.03);

                const ringPhase = portalPhase * (0.55 + i * 0.06) * timeSpeed;
                const wobble = (Math.sin(ringPhase + i) * 0.08) + (Math.cos(ringPhase * 0.7 - i) * 0.06);
                const startA = ringPhase + wobble;
                const endA = startA + (Math.PI * 2);

                portalCtx.save();
                portalCtx.translate(centerX, centerY);
                portalCtx.rotate(riftAngleRad);
                portalCtx.scale(riftWidth, 1 / Math.max(0.65, riftWidth));

                portalCtx.beginPath();
                portalCtx.arc(0, 0, radius, startA, endA);

                const gradient = portalCtx.createRadialGradient(0, 0, radius * 0.8, 0, 0, radius);
                gradient.addColorStop(0, `rgba(0, 242, 255, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(157, 0, 255, ${alpha * 0.8})`);
                gradient.addColorStop(1, `rgba(255, 20, 147, ${alpha * 0.5})`);

                portalCtx.strokeStyle = gradient;
                portalCtx.lineWidth = 2 + (i * 0.5) + (Math.abs(wobble) * 2.2);
                portalCtx.stroke();

                portalCtx.restore();
            }

            // Volumetric lighting effect
            const lightGradient = portalCtx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 220);
            lightGradient.addColorStop(0, `rgba(0, 242, 255, ${0.14 + Math.abs(pitchNorm) * 0.08})`);
            lightGradient.addColorStop(0.5, `rgba(157, 0, 255, ${0.08 + (timeSpeed - 1) * 0.03})`);
            lightGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');

            portalCtx.fillStyle = lightGradient;
            portalCtx.fillRect(0, 0, portalLogicalWidth, portalLogicalHeight);
        }

        // Animation loop
        function animatePortal() {
            const nowMs = (typeof performance !== 'undefined' && performance.now) ? performance.now() : Date.now();
            const dtSec = Math.max(0.001, Math.min(0.05, (nowMs - lastFrameTimeMs) / 1000));
            lastFrameTimeMs = nowMs;

            updateAdaptiveQuality(dtSec);

            // Time shift drives how fast the rift evolves
            const timeSpeed = Math.max(0.25, Math.min(3.0, currentTimeShift / 100));
            portalPhase += dtSec * (0.9 + timeSpeed * 1.6);

            updatePortalVisuals();
            requestAnimationFrame(animatePortal);
        }

        // Initialize
        initPortal();
        refreshQualityUi();
        animatePortal();
        updateCoordinates();

        function updateEngineParams() {
            const pitch = currentPitchBend + currentKeySemitones + (currentDetuneCents / 100);
            const stretch = currentTimeShift; // %

            if (timePitchEngine === 'pro' && soundtouchNode) {
                const tempo = Math.max(0.25, Math.min(4.0, stretch / 100));
                soundtouchNode.port.postMessage({ tempo, pitchSemitones: pitch });
            }
            if (timePitchEngine === 'rubberband' && rubberbandNode) {
                // Placeholder for Rubberband param updates
            }
            if (timePitchEngine === 'paulstretch' && paulstretchNode) {
                let s = 1.0;
                if (stretch < 100) s = 100 / Math.max(1, stretch);
                else s = 100 / stretch;

                try {
                    paulstretchNode.parameters.get('stretch').value = s;
                    paulstretchNode.parameters.get('windowSize').value = 0.1 + (currentSauce / 100) * 1.0;
                } catch (e) { }
            }
            if (timePitchEngine === 'granular' && granularNode) {
                try {
                    granularNode.parameters.get('density').value = 0.5 + (currentSauce / 100) * 4.0;
                    granularNode.parameters.get('spread').value = (currentDetuneCents + 100) / 200;
                    granularNode.parameters.get('pitch').value = pitch;
                    granularNode.parameters.get('grainSize').value = 0.1 + (100 - stretch) / 100 * 0.2;
                } catch (e) { }
            }
        }

        // Export to Server Function
        async function exportToServer() {
            if (!currentFileArrayBuffer) return alert("Load audio first!");
            if (isPlaying) togglePlay();

            const btn = document.querySelector('button[onclick="exportToServer()"]');
            const status = document.getElementById('serverStatus');
            if (status) status.innerText = "UPLOADING...";
            if (btn) btn.disabled = true;

            try {
                const formData = new FormData();
                const blob = new Blob([currentFileArrayBuffer], { type: 'audio/wav' });
                formData.append('audio', blob, 'upload.wav');

                formData.append('tempo', currentTimeShift / 100);
                formData.append('pitch', currentPitchBend + currentKeySemitones);

                const effects = {
                    reverb: { enabled: document.getElementById('srvReverb').checked, roomSize: 0.6, wetLevel: 0.4 },
                    saturation: { enabled: document.getElementById('srvDistortion').checked, drive: 0.5 },
                    delay: { enabled: document.getElementById('srvDelay').checked, time: 0.3, feedback: 0.4 },
                    limiter: { enabled: document.getElementById('srvLimiter').checked },
                    compressor: { enabled: true }
                };
                formData.append('effects', JSON.stringify(effects));

                if (status) status.innerText = "PROCESSING...";
                const res = await fetch('http://localhost:8000/api/process', {
                    method: 'POST',
                    body: formData
                });

                if (!res.ok) throw new Error(await res.text());

                const json = await res.json();
                if (status) status.innerText = "DOWNLOADING...";

                const dlUrl = `http://localhost:8000/api/download/${json.id}`;
                const a = document.createElement('a');
                a.href = dlUrl;
                a.download = `Server_Render_${json.id.substr(0, 4)}.wav`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                if (status) status.innerText = "DONE!";
                setTimeout(() => { if (status) status.innerText = ""; }, 3000);

            } catch (e) {
                console.error(e);
                if (status) status.innerText = "ERROR";
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        // Download processed audio (offline rendering with pitch shift)
        async function downloadProcessedAudio() {
            if (!currentFileArrayBuffer) {
                statusText.innerText = "LOAD AUDIO FIRST";
                setTimeout(() => statusText.innerText = "PORTAL READY", 2000);
                return;
            }
            if (!audioCtx) initAudio();

            const prevStatus = statusText.innerText;
            statusText.innerText = "RENDERING PORTAL...";

            try {
                const audioBuffer = await audioCtx.decodeAudioData(currentFileArrayBuffer);

                const totalSemitones = currentKeySemitones + currentPitchBend + (currentDetuneCents / 100);

                let offlineChannels = audioBuffer.numberOfChannels;
                let offlineSampleRate = audioBuffer.sampleRate;
                let offlineData = null; // { channelBuffers: Float32Array[], sampleRate }
                let offlineLength = 0;

                if (timePitchEngine === 'pro') {
                    // HQ, independent tempo/pitch via RubberBand worker.
                    statusText.innerText = "RENDERING (HQ)...";
                    offlineData = await rubberbandProcessBuffer(audioBuffer, {
                        pitchSemitones: totalSemitones,
                        timeStretchPct: currentTimeShift
                    });
                    offlineChannels = offlineData.channelBuffers.length;
                    offlineSampleRate = offlineData.sampleRate;
                    offlineLength = offlineData.channelBuffers[0] ? offlineData.channelBuffers[0].length : 0;
                } else {
                    // Basic: linked pitch/time via playbackRate.
                    const timeStretchFactor = currentTimeShift / 100;
                    const pitchShiftFactor = Math.pow(2, totalSemitones / 12);
                    const combinedRate = timeStretchFactor * pitchShiftFactor;
                    offlineLength = Math.max(1, Math.floor(audioBuffer.length / combinedRate));
                }

                const offlineCtx = new OfflineAudioContext(
                    offlineChannels,
                    Math.max(1, offlineLength),
                    offlineSampleRate
                );

                const source = offlineCtx.createBufferSource();

                if (offlineData) {
                    const buf = offlineCtx.createBuffer(offlineChannels, offlineLength, offlineSampleRate);
                    for (let ch = 0; ch < offlineChannels; ch++) {
                        const data = offlineData.channelBuffers[ch];
                        if (!data) continue;
                        try {
                            buf.copyToChannel(data, ch, 0);
                        } catch {
                            buf.getChannelData(ch).set(data);
                        }
                    }
                    source.buffer = buf;
                    source.playbackRate.value = 1;
                } else {
                    // Basic path uses playbackRate on the source.
                    source.buffer = audioBuffer;
                    const timeStretchFactor = currentTimeShift / 100;
                    const pitchShiftFactor = Math.pow(2, totalSemitones / 12);
                    const combinedRate = timeStretchFactor * pitchShiftFactor;
                    source.playbackRate.value = combinedRate;
                }

                // Offline sauce chain (matches realtime)
                const oEqLow = offlineCtx.createBiquadFilter();
                oEqLow.type = 'lowshelf';
                oEqLow.frequency.value = 180;
                const oEqHigh = offlineCtx.createBiquadFilter();
                oEqHigh.type = 'highshelf';
                oEqHigh.frequency.value = 6500;
                const oComp = offlineCtx.createDynamicsCompressor();
                const oDry = offlineCtx.createGain();
                const oConvolver = offlineCtx.createConvolver();
                oConvolver.buffer = createImpulseResponse(offlineCtx);
                const oReverbWet = offlineCtx.createGain();
                const oFlangerDelay = offlineCtx.createDelay(0.02);
                const oFlangerWet = offlineCtx.createGain();
                const oLfo = offlineCtx.createOscillator();
                const oLfoGain = offlineCtx.createGain();
                oLfo.type = 'sine';

                const oOutputGain = offlineCtx.createGain();
                const mainVal = currentMainKnobVal;
                const baseGain = (mainVal / 50) * (mainVal / 50);
                const sauceLoudness = 1 + clamp(currentSauce / 100, 0, 1) * 0.35;
                oOutputGain.gain.value = baseGain * sauceLoudness;

                // Connect
                source.connect(oEqLow);
                oEqLow.connect(oEqHigh);
                oEqHigh.connect(oComp);

                oComp.connect(oDry);
                oComp.connect(oFlangerDelay);
                oComp.connect(oConvolver);
                oFlangerDelay.connect(oFlangerWet);
                oConvolver.connect(oReverbWet);

                oDry.connect(oOutputGain);
                oFlangerWet.connect(oOutputGain);
                oReverbWet.connect(oOutputGain);
                oOutputGain.connect(offlineCtx.destination);

                // Sauce params
                const s = clamp(currentSauce / 100, 0, 1);
                const wetMix = clamp(currentWetDry / 100, 0, 1);
                oEqLow.gain.value = s * 3.5;
                oEqHigh.gain.value = s * 2.4;
                oComp.threshold.value = -18 - s * 10;
                oComp.ratio.value = 2 + s * 2.5;
                oComp.attack.value = 0.004 + s * 0.006;
                oComp.release.value = 0.12 + s * 0.18;
                oDry.gain.value = 1 - (s * wetMix) * 0.10;
                oReverbWet.gain.value = (s * wetMix) * 0.18;

                const baseDelay = 0.0028 + s * 0.0022;
                const depth = 0.0012 + s * 0.0026;
                oFlangerDelay.delayTime.value = baseDelay;
                oFlangerWet.gain.value = (s * wetMix) * 0.22;
                oLfo.frequency.value = 0.08 + s * 0.42;
                oLfoGain.gain.value = depth;
                oLfo.connect(oLfoGain);
                oLfoGain.connect(oFlangerDelay.delayTime);
                oLfo.start(0);

                source.start(0);
                const renderedBuffer = await offlineCtx.startRendering();

                const wavBlob = bufferToWave(renderedBuffer, renderedBuffer.length);
                const url = URL.createObjectURL(wavBlob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = "temporal_pitch_portal_output.wav";
                document.body.appendChild(a);
                a.click();

                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                statusText.innerText = "EXPORT COMPLETE";
                setTimeout(() => { statusText.innerText = prevStatus; }, 3000);
            } catch (e) {
                console.error('Render error:', e);
                const errorMsg = e.message || e.toString() || 'RENDER FAILED';
                statusText.innerText = `ERROR: ${errorMsg}`;
                setTimeout(() => { statusText.innerText = prevStatus; }, 4000);
            }
        }

        function ensureRubberbandWorker() {
            if (rubberbandWorker) return rubberbandWorker;
            const url = `./rubberband-worker.js?vendorBase=${encodeURIComponent('/vendor/rubberband-wasm')}`;
            rubberbandWorker = new Worker(url);
            return rubberbandWorker;
        }

        async function rubberbandProcessBuffer(audioBuffer, { pitchSemitones, timeStretchPct }) {
            const worker = ensureRubberbandWorker();
            const channels = audioBuffer.numberOfChannels;
            const channelBuffers = [];
            const transfer = [];

            for (let ch = 0; ch < channels; ch++) {
                const copy = new Float32Array(audioBuffer.getChannelData(ch));
                channelBuffers.push(copy);
                transfer.push(copy.buffer);
            }

            return await new Promise((resolve, reject) => {
                const onMessage = (e) => {
                    const msg = e.data || {};
                    cleanup();
                    if (msg.error) reject(new Error(msg.error));
                    else resolve(msg);
                };
                const onError = (e) => {
                    cleanup();
                    reject(e && e.message ? new Error(e.message) : new Error('RubberBand worker error'));
                };
                const cleanup = () => {
                    try { worker.removeEventListener('message', onMessage); } catch { }
                    try { worker.removeEventListener('error', onError); } catch { }
                };

                worker.addEventListener('message', onMessage);
                worker.addEventListener('error', onError);
                worker.postMessage({
                    channelBuffers,
                    sampleRate: audioBuffer.sampleRate,
                    pitchSemitones,
                    timeStretchPct,
                    formantPreserve: false
                }, transfer);
            });
        }

        // Convert buffer to WAV
        function bufferToWave(abuffer, len) {
            let numOfChan = abuffer.numberOfChannels;
            let length = len * numOfChan * 2 + 44;
            let buffer = new ArrayBuffer(length);
            let view = new DataView(buffer);
            let channels = [];
            let offset = 0;

            function setUint16(data) {
                view.setUint16(offset, data, true);
                offset += 2;
            }
            function setUint32(data) {
                view.setUint32(offset, data, true);
                offset += 4;
            }

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8);
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt "
            setUint32(16);
            setUint16(1);
            setUint16(numOfChan);
            setUint32(abuffer.sampleRate);
            setUint32(abuffer.sampleRate * 2 * numOfChan);
            setUint16(numOfChan * 2);
            setUint16(16);
            setUint32(0x61746164); // "data"
            setUint32(length - offset - 4);

            for (let i = 0; i < abuffer.numberOfChannels; i++) {
                channels.push(abuffer.getChannelData(i));
            }

            for (let i = 0; i < len; i++) {
                for (let ch = 0; ch < numOfChan; ch++) {
                    let s = Math.max(-1, Math.min(1, channels[ch][i]));
                    s = (s < 0 ? s * 0x8000 : s * 0x7FFF);
                    view.setInt16(offset, s, true);
                    offset += 2;
                }
            }

            return new Blob([buffer], { type: "audio/wav" });
        }
    </script>
